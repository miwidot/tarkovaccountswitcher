<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarkov Account Switcher</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <!-- EFT Vignette overlay (hidden for non-EFT themes via CSS) -->
    <div class="vignette-overlay"></div>

    <!-- HEADER / TAB BAR -->
    <div class="app-header">
        <div class="tab-bar">
            <button class="tab-btn active" data-tab="accounts" id="tab-btn-accounts">Accounts</button>
            <button class="tab-btn" data-tab="add" id="tab-btn-add">Add</button>
            <button class="tab-btn" data-tab="settings" id="tab-btn-settings">Settings</button>
        </div>
    </div>

    <!-- UPDATE BANNER -->
    <div id="update-banner" class="update-banner hidden"></div>

    <!-- ACCOUNTS TAB -->
    <div class="tab-panel active" id="panel-accounts">
        <div id="accounts-status" class="status-message"></div>
        <div id="accounts-list" class="accounts-list"></div>
        <div id="accounts-empty" class="empty-state hidden">
            <div class="empty-icon">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
                    <circle cx="8.5" cy="7" r="4"/>
                    <line x1="20" y1="8" x2="20" y2="14"/>
                    <line x1="23" y1="11" x2="17" y2="11"/>
                </svg>
            </div>
            <h2 id="empty-title">No accounts saved yet</h2>
            <p id="empty-subtitle">Add your first account above</p>
        </div>
    </div>

    <!-- ADD ACCOUNT TAB -->
    <div class="tab-panel" id="panel-add">
        <h2 class="section-title" id="add-title">Add New Account</h2>

        <div class="divider"><div class="divider-diamond"></div></div>

        <label class="form-label" id="add-name-label">Account Name</label>
        <input type="text" class="form-input" id="add-name-input" placeholder="Main Account">

        <div class="form-separator"></div>

        <label class="form-label" id="add-email-label">Email</label>
        <input type="email" class="form-input" id="add-email-input" placeholder="your@email.com">

        <div class="form-separator"></div>
        <p class="help-text" id="add-help-text"></p>
        <div class="form-separator"></div>

        <div class="btn-row-center">
            <button class="btn btn-primary btn-large" id="add-submit-btn">Add Account & Start Launcher</button>
        </div>

        <div id="add-status" class="status-message"></div>
        <div class="spacer"></div>
    </div>

    <!-- SETTINGS TAB -->
    <div class="tab-panel" id="panel-settings">
        <h2 class="section-title" id="settings-title">Settings</h2>

        <div class="divider"><div class="divider-diamond"></div></div>

        <!-- Language -->
        <label class="form-label" id="settings-lang-label">Language</label>
        <select class="form-select" id="settings-lang-select">
            <option value="en">English</option>
            <option value="de">Deutsch</option>
        </select>

        <div class="form-separator"></div>

        <!-- Theme -->
        <label class="form-label" id="settings-theme-label">Theme / Design</label>
        <select class="form-select" id="settings-theme-select">
            <option value="eft">Escape from Tarkov</option>
            <option value="killa">Killa Girl</option>
            <option value="dark">Dark</option>
            <option value="light">Light</option>
            <option value="cappuccino">Cappuccino</option>
        </select>

        <div class="form-separator"></div>

        <!-- Launcher Path -->
        <label class="form-label" id="settings-path-label">BSG Launcher Path</label>
        <div class="input-row">
            <input type="text" class="form-input flex-grow" id="settings-path-input">
            <button class="btn btn-secondary" id="settings-browse-btn">Browse...</button>
        </div>

        <div class="btn-row">
            <button class="btn btn-primary" id="settings-save-btn">Save</button>
        </div>

        <div class="form-separator"></div>

        <!-- Autostart -->
        <div class="checkbox-row">
            <input type="checkbox" id="settings-autostart-check" class="form-checkbox">
            <label for="settings-autostart-check" class="form-label inline" id="settings-autostart-label">Start with Windows</label>
        </div>
        <p class="help-text small" id="settings-autostart-help">Automatically start the app on Windows login</p>

        <!-- Streamer Mode -->
        <div class="checkbox-row">
            <input type="checkbox" id="settings-streamer-check" class="form-checkbox">
            <label for="settings-streamer-check" class="form-label inline" id="settings-streamer-label">Streamer Mode</label>
        </div>
        <p class="help-text small" id="settings-streamer-help">Hides email addresses with ****</p>

        <div class="form-separator"></div>

        <div id="settings-status" class="status-message"></div>

        <div class="spacer"></div>

        <!-- Quit Button -->
        <div class="btn-row-center" style="margin-bottom: 14px;">
            <button class="btn btn-danger" id="settings-quit-btn">Quit / Beenden</button>
        </div>

        <!-- Footer -->
        <div class="settings-footer">
            <p class="version-text" id="version-text">Tarkov Account Switcher</p>
            <p class="powered-by">Powered by <a href="https://tarkov-stammtisch.de" target="_blank">Tarkov-Stammtisch.de</a></p>
        </div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
